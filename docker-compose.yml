services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: printerdb
      MYSQL_USER: printer_app
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build: ./app
    restart: unless-stopped
    ports:
      - "7070:7070"
    environment:
      DATABASE_URL: mysql+pymysql://printer_app:${DB_PASSWORD}@db/printerdb
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - ./config.yaml:/project/app/config.yaml:ro
      - ./VERSION:/project/VERSION:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project/repo
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
