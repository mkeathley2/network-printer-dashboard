<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set Your Password — Printer Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #1a1d23; }
    .login-card { max-width: 420px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card w-100 px-3">
    <div class="card shadow-lg border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-key-fill fs-1 text-warning"></i>
          <h4 class="mt-2 mb-0">Set Your Password</h4>
          <p class="text-muted small">Your account has a temporary password.<br>Please choose a new one to continue.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible py-2 mb-3">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <div class="mb-3">
            <label class="form-label">New Password <span class="text-muted small">(min 8 characters)</span></label>
            <input type="password" name="new_password" id="new_password"
                   class="form-control" required minlength="8" autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password"
                   class="form-control" required minlength="8">
            <div id="match-msg" class="form-text"></div>
          </div>
          <button type="submit" class="btn btn-warning w-100 fw-semibold">
            <i class="bi bi-check-circle me-1"></i>Set Password &amp; Continue
          </button>
          <div class="text-center mt-3">
            <a href="{{ url_for('auth.logout') }}" class="text-muted small">Sign out</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Live confirmation match feedback
    var pw = document.getElementById('new_password');
    var cf = document.getElementById('confirm_password');
    var msg = document.getElementById('match-msg');
    function checkMatch() {
      if (!cf.value) { msg.textContent = ''; return; }
      if (pw.value === cf.value) {
        msg.textContent = '✓ Passwords match';
        msg.className = 'form-text text-success';
      } else {
        msg.textContent = '✗ Passwords do not match';
        msg.className = 'form-text text-danger';
      }
    }
    pw.addEventListener('input', checkMatch);
    cf.addEventListener('input', checkMatch);
  </script>
</body>
</html>
