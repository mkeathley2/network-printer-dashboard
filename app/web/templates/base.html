<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Network Printer Dashboard{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Chart.js Adapter (for time axis) -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .05em; }
    .supply-bar { height: 20px; border-radius: 4px; transition: width .4s; }
    .status-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: 5px;
    }
    .status-online  { background: #198754; }
    .status-offline { background: #dc3545; }
    .status-unknown { background: #adb5bd; }
    .card-printer { transition: box-shadow .2s; }
    .card-printer:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .supply-critical { color: #dc3545; font-weight: 600; }
    .supply-warning  { color: #fd7e14; font-weight: 600; }
    .supply-ok       { color: #198754; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "components/_navbar.html" %}

  <div class="container-fluid py-3">
    {% include "components/_flash.html" %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
